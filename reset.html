<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Сброс пароля — ПроУрок</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Geologica:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0f1117; --surface:#181c27; --surface2:#1e2435; --border:#2a3045; --accent:#4f7cff; --accent2:#7c5cfc; --gold:#e8c87a; --text:#e8eaf0; --muted:#7a8099; --success:#4ade80; --error:#f87171; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Geologica',sans-serif; font-weight:300; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .login-box { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:40px 36px; width:100%; max-width:420px; }
  .login-logo { text-align:center; margin-bottom:20px; }
  .login-title { font-family:'Playfair Display',serif; font-size:26px; font-weight:700; text-align:center; margin-bottom:4px; }
  .login-title span { color:var(--gold); }
  .login-sub { color:var(--muted); font-size:13px; text-align:center; margin-bottom:28px; }
  .reset-steps { display:flex; gap:6px; margin-bottom:28px; justify-content:center; align-items:center; }
  .step { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted); }
  .step.active { color:var(--text); }
  .step.done { color:var(--success); }
  .step-num { width:24px; height:24px; border-radius:50%; border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:600; flex-shrink:0; }
  .step.active .step-num { background:linear-gradient(135deg,var(--accent),var(--accent2)); border-color:transparent; color:#fff; }
  .step.done .step-num { background:var(--success); border-color:transparent; color:#0f1117; }
  .step-arrow { color:var(--border); font-size:14px; margin:0 2px; }
  .form-group { margin-bottom:10px; }
  .login-input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:12px; padding:13px 16px; color:var(--text); font-family:'Geologica',sans-serif; font-size:14px; outline:none; transition:border-color 0.2s; }
  .login-input:focus { border-color:rgba(79,124,255,0.5); }
  .login-input::placeholder { color:var(--muted); }
  .password-wrap { position:relative; }
  .password-wrap .login-input { padding-right:44px; }
  .eye-btn { position:absolute; right:12px; top:50%; transform:translateY(-50%); background:none; border:none; color:var(--muted); cursor:pointer; font-size:15px; }
  .login-btn { width:100%; background:linear-gradient(135deg,var(--accent),var(--accent2)); border:none; border-radius:12px; padding:14px; color:#fff; font-family:'Geologica',sans-serif; font-size:15px; font-weight:600; cursor:pointer; transition:all 0.2s; margin-top:4px; }
  .login-btn:hover { transform:translateY(-1px); box-shadow:0 6px 20px rgba(79,124,255,0.35); }
  .login-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
  .login-msg { font-size:13px; text-align:center; margin-top:14px; min-height:18px; }
  .login-msg.err { color:var(--error); }
  .login-msg.ok { color:var(--success); }
  .back-link { display:block; text-align:center; font-size:13px; color:var(--muted); cursor:pointer; margin-top:16px; transition:color 0.2s; text-decoration:none; }
  .back-link:hover { color:var(--accent); }
  .success-box { text-align:center; padding:20px 0; }
  .success-box .s-icon { font-size:48px; margin-bottom:16px; }
  .success-box h3 { font-family:'Playfair Display',serif; font-size:20px; margin-bottom:8px; }
  .success-box p { color:var(--muted); font-size:14px; line-height:1.6; }
</style>
</head>
<body>
<div class="login-box">
  <div class="login-logo"><svg style="width:56px;height:46px;" width="680" height="556" viewBox="0 0 680 556" fill="none" xmlns="http://www.w3.org/2000/svg">

  <div class="login-title">Про<span>Урок</span></div>
  <div class="login-sub">Восстановление пароля</div>

  <div class="reset-steps" id="stepsBar">
    <div class="step active" id="step1"><div class="step-num">1</div><span>Email</span></div>
    <div class="step-arrow">›</div>
    <div class="step" id="step2"><div class="step-num">2</div><span>Письмо</span></div>
    <div class="step-arrow">›</div>
    <div class="step" id="step3"><div class="step-num">3</div><span>Новый пароль</span></div>
  </div>

  <!-- ШАГ 1: email -->
  <div id="step1Form">
    <div class="form-group">
      <input class="login-input" type="email" id="resetEmail" placeholder="Введите ваш Email"/>
    </div>
    <button class="login-btn" onclick="sendReset()">Отправить письмо →</button>
    <a class="back-link" href="/">← Вернуться ко входу</a>
  </div>

  <!-- ШАГ 2: ожидание письма -->
  <div id="step2Form" style="display:none;">
    <div class="success-box">
      <div class="s-icon">📬</div>
      <h3>Письмо отправлено!</h3>
      <p>Проверьте почту и нажмите на ссылку в письме.<br>Ссылка действительна <b style="color:var(--text)">2 часа</b>.</p>
    </div>
    <a class="back-link" href="/">← Вернуться ко входу</a>
  </div>

  <!-- ШАГ 3: новый пароль -->
  <div id="step3Form" style="display:none;">
    <div class="form-group">
      <div class="password-wrap">
        <input class="login-input" type="password" id="newPassword" placeholder="Новый пароль"/>
        <button class="eye-btn" onclick="togglePwd('newPassword',this)">👁</button>
      </div>
    </div>
    <div class="form-group">
      <div class="password-wrap">
        <input class="login-input" type="password" id="newPassword2" placeholder="Повторите пароль"/>
        <button class="eye-btn" onclick="togglePwd('newPassword2',this)">👁</button>
      </div>
    </div>
    <button class="login-btn" onclick="confirmReset()">Сохранить пароль →</button>
  </div>

  <!-- УСПЕХ -->
  <div id="successForm" style="display:none;">
    <div class="success-box">
      <div class="s-icon">✅</div>
      <h3>Пароль изменён!</h3>
      <p>Теперь вы можете войти с новым паролем.</p>
    </div>
    <a class="login-btn" href="/" style="display:block;text-align:center;text-decoration:none;margin-top:16px;">Войти →</a>
  </div>

  <div class="login-msg" id="resetMsg"></div>
</div>

<script>
const API_URL = "http://95.140.147.248:5001";
let resetToken = null;

window.onload = function() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");
  if (token) {
    resetToken = token;
    showStep(3);
  }
};

function showStep(n) {
  ['step1Form','step2Form','step3Form','successForm'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
  document.getElementById(`step${n}Form`).style.display = 'block';
  [1,2,3].forEach(i => {
    const el = document.getElementById(`step${i}`);
    el.className = 'step' + (i < n ? ' done' : i === n ? ' active' : '');
    el.querySelector('.step-num').textContent = i < n ? '✓' : i;
  });
}

function togglePwd(id, btn) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
  btn.textContent = inp.type === 'password' ? '👁' : '🙈';
}

async function sendReset() {
  const email = document.getElementById("resetEmail").value.trim();
  if (!email) { showMsg("Введите email", "err"); return; }
  showMsg("", "");
  try {
    const r = await fetch(`${API_URL}/api/auth/reset/request`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email })
    });
    const d = await r.json();
    if (d.ok) { showStep(2); }
    else { showMsg(d.error, "err"); }
  } catch(e) { showMsg("Ошибка подключения", "err"); }
}

async function confirmReset() {
  const p1 = document.getElementById("newPassword").value;
  const p2 = document.getElementById("newPassword2").value;
  if (p1.length < 6) { showMsg("Пароль не менее 6 символов", "err"); return; }
  if (p1 !== p2) { showMsg("Пароли не совпадают", "err"); return; }
  showMsg("", "");
  try {
    const r = await fetch(`${API_URL}/api/auth/reset/confirm`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token: resetToken, password: p1 })
    });
    const d = await r.json();
    if (d.ok) {
      document.getElementById("stepsBar").style.display = "none";
      document.getElementById("step3Form").style.display = "none";
      document.getElementById("successForm").style.display = "block";
    } else { showMsg(d.error, "err"); }
  } catch(e) { showMsg("Ошибка подключения", "err"); }
}

function showMsg(msg, type) {
  const el = document.getElementById("resetMsg");
  el.textContent = msg;
  el.className = "login-msg " + (type || "");
}
</script>
</body>
</html>
